# --- 基础信息 / Basic Information ---
local app_id="dstatus"
local app_name="DStatus"
local app_text="现代化服务器状态监控面板，支持实时监控与多服务器管理"
local app_url="https://github.com/fev125/dstatus"
local docker_name="dstatus"
local docker_port="5555"
local app_size="1"

# --- 核心逻辑 / Core Logic ---
docker_app_install() {
    local app_dir="/home/docker/dstatus"
    mkdir -p "${app_dir}/data/backups" "${app_dir}/data/temp" "${app_dir}/logs"
    chmod -R 777 "${app_dir}/data"
    chmod -R 755 "${app_dir}/logs"
    cd "${app_dir}" || return 1

    cat <<EOF > docker-compose.yml
services:
  dstatus:
    image: ghcr.io/fev125/dstatus:latest
    container_name: ${docker_name}
    restart: always
    ports:
      - "${docker_port}:5555"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - BOT_ENABLED=false
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
EOF

    docker compose up -d --remove-orphans
    echo "安装完成 / Install Complete"
    check_docker_app_ip
    echo "默认密码: dstatus"
    echo "请首次登录后立即修改默认密码。"
}

docker_app_update() {
    local app_dir="/home/docker/dstatus"
    cd "${app_dir}" || return 1
    docker compose pull
    docker compose up -d --remove-orphans
    echo "更新完成 / Update Complete"
}

docker_app_uninstall() {
    local app_dir="/home/docker/dstatus"
    cd "${app_dir}" || return 1
    docker compose down --rmi all
    rm -rf "${app_dir}"
    echo "卸载完成 / Uninstall Complete"
}

# --- 注册 / Registration ---
docker_app_plus
