# NPC Client Configuration for kejilion/apps
# Official: https://github.com/yisier/nps
# NPS内网穿透客户端，连接NPS服务端建立隧道

# --- 基础信息 ---
local app_id="npc"
local app_name="NPC"
local app_text="NPS内网穿透客户端，连接服务端后支持TCP/UDP/HTTP/HTTPS/SOCKS5等隧道穿透"
local app_url="https://github.com/yisier/nps"
local docker_name="npc"
local docker_port="${docker_port:-0}"
local app_size="1"

# --- 核心逻辑 ---
docker_app_install() {
    local app_dir="/home/docker/npc"
    mkdir -p "${app_dir}"
    cd "${app_dir}" || return 1

    # 交互式获取连接参数
    echo "================================================"
    echo "  NPC 客户端安装"
    echo "================================================"
    echo ""
    echo "  请输入 NPS 服务端连接信息："
    echo "  （可在 NPS 管理面板 → 客户端列表 → 快捷启动命令 中获取）"
    echo ""

    # 读取服务端地址
    read -p "  服务端地址 (如 1.2.3.4:8024): " server_addr
    if [ -z "${server_addr}" ]; then
        echo "错误：服务端地址不能为空！"
        return 1
    fi

    # 读取验证密钥
    read -p "  客户端验证密钥 (vkey): " vkey
    if [ -z "${vkey}" ]; then
        echo "错误：验证密钥不能为空！"
        return 1
    fi

    # 询问是否启用 TLS
    read -p "  是否启用TLS？(y/n) [默认n]: " use_tls
    local tls_flag=""
    if [[ "${use_tls}" =~ ^[Yy]$ ]]; then
        tls_flag="-tls_enable=true"
    fi

    # 写入 docker-compose.yml
    # NPC 需要 host 网络，便于访问本地服务
    cat > docker-compose.yml <<YML
services:
  npc:
    image: yisier1/npc:latest
    container_name: npc
    restart: unless-stopped
    network_mode: host
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Shanghai
    command: -server=${server_addr} -vkey=${vkey} ${tls_flag}
YML

    # 启动容器
    echo ""
    echo "正在拉取并启动 NPC 客户端..."
    docker compose up -d

    sleep 5

    echo "================================================"
    echo "  NPC 客户端安装完成！"
    echo "================================================"
    echo ""
    echo "  连接信息:"
    echo "    服务端: ${server_addr}"
    echo "    验证密钥: ${vkey}"
    echo "    TLS: $(if [ -n "${tls_flag}" ]; then echo '已启用'; else echo '未启用'; fi)"
    echo ""
    echo "  查看日志: docker logs npc"
    echo "  配置目录: ${app_dir}"
    echo ""
    echo "  提示: 如需修改连接参数，编辑 ${app_dir}/docker-compose.yml 后执行 docker compose up -d"
    echo "================================================"

    check_docker_app_ip
}

docker_app_update() {
    local app_dir="/home/docker/npc"
    cd "${app_dir}" || return 1
    docker compose pull
    docker compose up -d
    echo "NPC 客户端已更新至最新版本。"
}

docker_app_uninstall() {
    local app_dir="/home/docker/npc"
    cd "${app_dir}" || return 1
    docker compose down --rmi all
    rm -rf "${app_dir}"
    echo "NPC 客户端已彻底卸载。"
}

# --- 注册 ---
docker_app_plus
