# IYUUPlus Configuration for kejilion/apps
# Official: https://doc.iyuu.cn/guide/install-docker-compose
# IYUUPlus is an auto reseed tool for PT (Private Tracker) users.

local app_id="iyuuplus"
local app_name="IYUUPlus"
local app_text="全自动PT辅种与管理工具，支持多客户端互通"
local app_url="https://github.com/ledccn/iyuuplus-dev"
local docker_name="IYUUPlus"
local docker_port="8780"
local app_size="1"

docker_app_install() {
    local app_dir="/home/docker/${app_name}"
    mkdir -p "${app_dir}/iyuu" "${app_dir}/data"
    cd "${app_dir}" || return 1

    cat <<EOF > docker-compose.yml
services:
  iyuuplus:
    image: iyuucn/iyuuplus-dev:latest
    container_name: ${docker_name}
    restart: unless-stopped
    ports:
      - "\${DOCKER_PORT:-${docker_port}}:8780"
    volumes:
      - ./iyuu:/iyuu
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
EOF

    cat <<EOF > .env
DOCKER_PORT=${docker_port}
EOF

    docker compose up -d
    echo "安装完成 / Install Complete"
    check_docker_app_ip
    echo "首次访问需要设置管理员账号和绑定爱语飞飞token"
}

docker_app_update() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose pull
    docker compose up -d --remove-orphans
    echo "更新完成 / Update Complete"
}

docker_app_uninstall() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose down --rmi all
    cd /home/docker && rm -rf "${app_name}"
    echo "卸载完成 / Uninstall Complete"
}

docker_app_plus
