# --- 基础信息 / Basic Information ---
local app_id="fast-note-sync-service"
local app_name="Fast Note Sync Service"
local app_text="高性能、低延迟的笔记同步、在线管理平台，支持MCP协议和多设备实时同步。"
local app_url="https://github.com/haierkeys/fast-note-sync-service"
local docker_name="fast-note-sync-service"
local docker_port="9000"
local app_size="2"

# --- 核心逻辑 / Core Logic ---
docker_app_install() {
    # 1. 环境准备
    local base_dir="/home/docker/fast-note-sync-service"
    mkdir -p "$base_dir/storage" "$base_dir/config" && cd "$base_dir"

    # 2. 写入 Docker Compose
    echo "正在生成 Docker Compose 配置..."
    cat <<EOF > docker-compose.yml
version: '3'
services:
  fast-note-sync-service:
    image: haierkeys/fast-note-sync-service:latest
    container_name: fast-note-sync-service
    restart: unless-stopped
    ports:
      - "${docker_port}:9000"
    volumes:
      - ./storage:/fast-note-sync/storage
      - ./config:/fast-note-sync/config
    environment:
      - TZ=Asia/Shanghai
EOF

    # 3. 启动容器
    echo "正在启动 Fast Note Sync Service..."
    docker compose up -d

    # 4. 等待容器启动
    echo "等待服务启动..."
    sleep 5

    echo "------------------------------------------------"
    echo "  Fast Note Sync Service 安装完成！"
    check_docker_app_ip
    echo "  默认访问端口: ${docker_port}"
    echo "  访问地址: http://<你的IP>:${docker_port}"
    echo "  首次登录: 创建账户 (默认开启注册)"
    echo "  后续可配置Obsidian插件进行同步"
    echo "  数据存储位置: /home/docker/fast-note-sync-service/storage"
    echo "  配置文件位置: /home/docker/fast-note-sync-service/config"
    echo "------------------------------------------------"
}

docker_app_update() {
    cd /home/docker/fast-note-sync-service
    echo "正在更新 Fast Note Sync Service 镜像..."
    docker compose pull
    docker compose up -d
    echo "更新完成 / Update Complete"
}

docker_app_uninstall() {
    cd /home/docker/fast-note-sync-service
    echo "正在卸载 Fast Note Sync Service..."
    docker compose down --rmi all
    rm -rf /home/docker/fast-note-sync-service
    echo "卸载完成 / Uninstall Complete"
}

# --- 注册 / Registration ---
docker_app_plus
