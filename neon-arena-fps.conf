# 霓虹竞技场 NEON ARENA Configuration for kejilion/apps
# Official: https://github.com/kejilion/game-collection
# Docker image: https://hub.docker.com/r/kjlion/neon-arena-fps

local app_id="neon-arena-fps"
local app_name="霓虹竞技场 NEON ARENA"
local app_text="3D第一人称多人在线射击游戏，霓虹风格竞技场"
local app_url="https://github.com/kejilion/game-collection"
local docker_name="neon-arena-fps"
local docker_port="3000"
local app_size="1"

# --- 核心逻辑 / Core Logic ---
docker_app_install() {
    local app_dir="/home/docker/neon-arena-fps"
    mkdir -p "${app_dir}/data"
    cd "${app_dir}" || return 1

    cat <<EOF > docker-compose.yml
services:
  neon-arena-fps:
    image: kjlion/neon-arena-fps:latest
    container_name: ${docker_name}
    restart: unless-stopped
    ports:
      - "${docker_port}:3000"
    environment:
      - PORT=3000
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
EOF

    docker compose up -d
    echo "霓虹竞技场 NEON ARENA 已部署完成！"
    check_docker_app_ip
    echo "访问地址：http://服务器IP:${docker_port}"
    echo "排行榜/玩家数据目录：${app_dir}/data"
}

docker_app_update() {
    local app_dir="/home/docker/neon-arena-fps"
    cd "${app_dir}" || return 1
    docker compose pull
    docker compose up -d
    echo "霓虹竞技场 NEON ARENA 已更新完成。"
}

docker_app_uninstall() {
    local app_dir="/home/docker/neon-arena-fps"
    cd "${app_dir}" || return 1
    docker compose down --rmi all
    rm -rf "${app_dir}"
    echo "霓虹竞技场 NEON ARENA 已彻底卸载，包括排行榜与玩家数据。"
}

