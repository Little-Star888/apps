# Arena Brawl Configuration for kejilion/apps
# Official: https://github.com/kejilion/game-collection
# Docker image: https://hub.docker.com/r/kjlion/arena-brawl

local app_id="arena-brawl"
local app_name="大乱斗 Arena Brawl"
local app_text="实时多人在线网页大乱斗游戏，支持排行榜与聊天"
local app_url="https://github.com/kejilion/game-collection"
local docker_name="arena-brawl"
local docker_port="3000"
local app_size="1"

# --- 核心逻辑 / Core Logic ---
docker_app_install() {
    local app_dir="/home/docker/arena-brawl"
    mkdir -p "${app_dir}/data"
    cd "${app_dir}" || return 1

    cat <<EOF > docker-compose.yml
services:
  arena-brawl:
    image: kjlion/arena-brawl:latest
    container_name: ${docker_name}
    restart: unless-stopped
    ports:
      - "${docker_port}:3000"
    environment:
      - PORT=3000
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
EOF

    docker compose up -d
    echo "大乱斗 Arena Brawl 已部署完成！"
    check_docker_app_ip
    echo "访问地址：http://服务器IP:${docker_port}"
    echo "排行榜数据目录：${app_dir}/data"
}

docker_app_update() {
    local app_dir="/home/docker/arena-brawl"
    cd "${app_dir}" || return 1
    docker compose pull
    docker compose up -d
    echo "大乱斗 Arena Brawl 已更新完成。"
}

docker_app_uninstall() {
    local app_dir="/home/docker/arena-brawl"
    cd "${app_dir}" || return 1
    docker compose down --rmi all
    rm -rf "${app_dir}"
    echo "大乱斗 Arena Brawl 已彻底卸载，包括排行榜数据。"
}

# --- 注册 / Registration ---
docker_app_plus
