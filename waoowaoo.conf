# --- 基础信息 / Basic Information ---
local app_id="waoowaoo"
local app_name="waoowaoo"
local app_text="首家工业级全流程 AI 影视生产平台，支持小说自动生成分镜、角色和合成完整配音短剧视频。"
local app_url="https://github.com/waoowaooAI/waoowaoo"
local docker_name="waoowaoo-app"
local docker_port="13000"
local app_size="1" # 1=小中型, 2=大型

# --- 核心逻辑 / Core Logic ---
docker_app_install() {
    # 1. 创建目录
    local base_dir="/home/docker/waoowaoo"
    mkdir -p "$base_dir" && cd "$base_dir"

    # 2. 克隆源码 (因为官方 docker-compose 依赖本地 build 构建)
    echo "正在从 GitHub 拉取 waoowaoo 源码..."
    if [ ! -d "waoowaoo-src" ]; then
        git clone https://github.com/saturndec/waoowaoo.git waoowaoo-src
    else
        cd waoowaoo-src && git pull && cd ..
    fi

    # 我们直接使用它官方的 docker-compose.yml
    cd "$base_dir/waoowaoo-src"

    # 3. 启动并构建容器
    echo "正在构建并启动 waoowaoo (包含 MySQL、Redis 和主程序)，这需要一些时间..."
    # 使用 docker compose 构建镜像并后台启动
    docker compose up -d --build

    # 4. 等待容器启动
    echo "正在等待服务初始化完成..."
    local retry_count=0
    local max_retries=60 # 等待最多 120 秒
    
    while [ $retry_count -lt $max_retries ]; do
        if curl -s "http://127.0.0.1:${docker_port}" > /dev/null; then
            echo "服务已成功启动！"
            break
        fi
        echo -n "."
        sleep 2
        retry_count=$((retry_count + 1))
    done

    echo ""
    echo "------------------------------------------------"
    echo "安装完成 / Install Complete"
    check_docker_app_ip
    echo "默认端口: 13000 (前端) / 13010 (Bull Board后台)"
    echo "进去后请先在设置中心配置各大 AI 服务的 API Key。"
    echo "------------------------------------------------"
}

docker_app_update() {
    local base_dir="/home/docker/waoowaoo/waoowaoo-src"
    if [ -d "$base_dir" ]; then
        cd "$base_dir"
        echo "正在拉取最新代码..."
        git pull
        echo "重新构建并重启服务..."
        docker compose down
        docker compose up -d --build
        echo "更新完成 / Update Complete"
    else
        echo "找不到源码目录，请先卸载后重新安装。"
    fi
}

docker_app_uninstall() {
    local base_dir="/home/docker/waoowaoo/waoowaoo-src"
    if [ -d "$base_dir" ]; then
        cd "$base_dir"
        docker compose down -v
    fi
    rm -rf /home/docker/waoowaoo
    docker rmi waoowaoo-src-app 2>/dev/null || true
    echo "卸载完成 / Uninstall Complete"
}

